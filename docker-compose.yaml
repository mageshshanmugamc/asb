services:
  asb-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: asb-sqlserver
    hostname: asb-sqlserver
    environment:
      SA_PASSWORD: "admin123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P admin123! -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - asb-network

  asb-neo4j:
    image: neo4j:5-community
    container_name: asb-neo4j
    hostname: asb-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - asb-network

  neo4j-init:
    image: neo4j:5-community
    profiles: ["init"]
    depends_on:
      asb-neo4j:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Seeding Neo4j...";
        grep -v '^//' /seed/neo4j_init.cypher | cypher-shell -u neo4j -p neo4jpassword -a bolt://asb-neo4j:7687 --non-interactive --format plain;
        echo "Neo4j seed completed successfully.";
    volumes:
      - ./neo4j_init.cypher:/seed/neo4j_init.cypher:ro
    restart: "no"
    networks:
      - asb-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    depends_on:
      asb-sqlserver:
        condition: service_healthy
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: mssql
      KC_DB_URL: "jdbc:sqlserver://asb-sqlserver:1433;databaseName=keycloakdb;encrypt=true;trustServerCertificate=true"
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: "KeycloakUser@123"
      KC_HOSTNAME: http://localhost:5000/keycloak
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /keycloak
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    networks:
      - asb-network

  asb-ui:
    image: asb-ui:latest
    pull_policy: never
    container_name: asb-ui
    ports:
      - "3001:80"
    networks:
      - asb-network

  asb-api:
    image: asb-api:latest
    pull_policy: never
    container_name: asb-api
    depends_on:
      asb-sqlserver:
        condition: service_healthy
      asb-neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      ConnectionStrings__AsbDatabase: "Server=asb-sqlserver;Database=asbdb;User Id=sa;Password=admin123!;TrustServerCertificate=True;"
      Keycloak__Authority: "http://keycloak:8080/realms/asb-keycloak"
      Keycloak__ClientId: "asb-oidc-provider"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AdminBaseUrl: "http://keycloak:8080"
      Keycloak__AdminRealm: "asb-keycloak"
      Keycloak__AdminUsername: "admin"
      Keycloak__AdminPassword: "admin"
      Jwt__Secret: "Asb@2026!SecureTokenSigningKey#WithEnoughLength"
      DatabaseProvider: "Neo4j"
      Neo4j__Uri: "bolt://asb-neo4j:7687"
      Neo4j__Username: "neo4j"
      Neo4j__Password: "neo4jpassword"
      Ollama__Endpoint: "http://host.docker.internal:11434"
      Ollama__ChatModel: "qwen2.5-coder:7b"
      Ollama__EmbeddingModel: "nomic-embed-text"
      Qdrant__Endpoint: "http://qdrant:6333"
      Qdrant__CollectionName: "asb_knowledge"
      Qdrant__VectorSize: "768"
    ports:
      - "4000:8080"
    networks:
      - asb-network

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - keycloak
      - asb-ui
      - asb-api
    ports:
      - "5000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - asb-network

  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["init"]
    depends_on:
      asb-sqlserver:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for SQL Server to be fully ready...";
        for i in $(seq 1 30); do
          /opt/mssql-tools18/bin/sqlcmd -C -S asb-sqlserver -U sa -P 'admin123!' -Q 'SELECT 1' > /dev/null 2>&1 && break;
          echo "Attempt $$i: SQL Server not ready, retrying in 2s...";
          sleep 2;
        done;
        echo "Running init scripts...";
        /opt/mssql-tools18/bin/sqlcmd -C -S asb-sqlserver -U sa -P 'admin123!' -Q "
          IF DB_ID('asbdb') IS NULL CREATE DATABASE asbdb;
          IF DB_ID('keycloakdb') IS NULL CREATE DATABASE keycloakdb;
        ";
        /opt/mssql-tools18/bin/sqlcmd -C -S asb-sqlserver -U sa -P 'admin123!' -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = 'banking_user')
            CREATE LOGIN banking_user WITH PASSWORD = 'BankingUser@123';
          ALTER LOGIN banking_user WITH PASSWORD = 'BankingUser@123';
          IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = 'keycloak_user')
            CREATE LOGIN keycloak_user WITH PASSWORD = 'KeycloakUser@123';
          ALTER LOGIN keycloak_user WITH PASSWORD = 'KeycloakUser@123';
        ";
        /opt/mssql-tools18/bin/sqlcmd -C -S asb-sqlserver -U sa -P 'admin123!' -d asbdb -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = 'banking_user')
            CREATE USER banking_user FOR LOGIN banking_user;
          IF IS_ROLEMEMBER('db_owner', 'banking_user') <> 1
            ALTER ROLE db_owner ADD MEMBER banking_user;
        ";
        /opt/mssql-tools18/bin/sqlcmd -C -S asb-sqlserver -U sa -P 'admin123!' -d keycloakdb -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = 'keycloak_user')
            CREATE USER keycloak_user FOR LOGIN keycloak_user;
          IF IS_ROLEMEMBER('db_owner', 'keycloak_user') <> 1
            ALTER ROLE db_owner ADD MEMBER keycloak_user;
        ";
        echo "SQL init completed successfully.";
    restart: "no"
    networks:
      - asb-network

  # ── AI Agent Infrastructure ──────────────────────────────────────────────────
  # Ollama runs on the host (not in Docker) — API reaches it via host.docker.internal:11434
  # Models required on host: qwen2.5-coder:7b, nomic-embed-text

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - asb-network

volumes:
  sql_data:
  neo4j_data:
  qdrant_data:

networks:
  asb-network:
    driver: bridge
